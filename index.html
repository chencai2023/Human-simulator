const BASIC_ACTIONS = [
  { type:"wake",   label:"起床",   icon:"☀️", pts:10 },
  { type:"water",  label:"喝水",   icon:"💧", pts:5  },
  { type:"meal",   label:"吃饭",   icon:"🍚", pts:8  },
  { type:"sleep",  label:"睡觉",   icon:"🌙", pts:10 },
  { type:"toilet", label:"上厕所", icon:"🚽", pts:5  },
];

const PRO_ACTIONS = [
  { type:"boil",   label:"烧水",   icon:"♨️", pts:12 },
  { type:"dishes", label:"洗碗",   icon:"🫧", pts:15 },
  { type:"trash",  label:"倒垃圾", icon:"🗑️", pts:12 },
];

const PTS = { wake:10, water:5, meal:8, sleep:10, toilet:5, boil:12, dishes:15, trash:12 };
const PRO_THRESHOLD = 100;

// ── 成就定义 ──────────────────────────────────────────────────────────────────

const ACHIEVEMENTS = [
  // 原有成就
  { id:"early",    icon:"🌅", label:"破晓者",     desc:"在早上7点前起床",
    check: log => log.some(e => e.type==="wake" && new Date(e.ts).getHours()<7) },
  { id:"night",    icon:"🌙", label:"夜行者",     desc:"在凌晨0-5点起床",
    check: log => log.some(e => e.type==="wake" && new Date(e.ts).getHours()<5) },
  { id:"hydrate3", icon:"💧", label:"水之意志",   desc:"单日喝水3次",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>e.type==="water"&&new Date(e.ts).toDateString()===t).length>=3; }},
  { id:"meals3",   icon:"🍱", label:"三餐完整",   desc:"单日完成三餐",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>e.type==="meal"&&new Date(e.ts).toDateString()===t).length>=3; }},
  { id:"first10",  icon:"📡", label:"坚持存在",   desc:"累计记录10件事",
    check: log => log.length>=10 },
  { id:"first50",  icon:"⚙️", label:"运行稳定",   desc:"累计记录50件事",
    check: log => log.length>=50 },
  { id:"chores3",  icon:"🏠", label:"生活管理员", desc:"单日完成3件家务",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>["boil","dishes","trash"].includes(e.type)&&new Date(e.ts).toDateString()===t).length>=3; }},

  // 新增异常成就
  { id:"pipeline",  icon:"🔩", label:"管道？",      desc:"一分钟内先吃饭后上厕所",
    check: log => {
      for (let i=0; i<log.length; i++) {
        if (log[i].type==="toilet") {
          for (let j=i+1; j<log.length; j++) {
            if (log[j].type==="meal" && log[j].ts > log[i].ts - 60000) return true;
            if (log[j].ts < log[i].ts - 60000) break;
          }
        }
      }
      return false;
    }},
  { id:"backwards", icon:"🔄", label:"逆时针",      desc:"同一天内睡觉出现在起床之前",
    check: log => {
      const t = new Date().toDateString();
      const today = log.filter(e=>new Date(e.ts).toDateString()===t);
      const firstWake = today.find(e=>e.type==="wake");
      const firstSleep = today.find(e=>e.type==="sleep");
      if (!firstWake || !firstSleep) return false;
      return firstSleep.ts < firstWake.ts;
    }},
  { id:"bouncing",  icon:"⚡", label:"反复横跳",    desc:"一小时内起床和睡觉各一次",
    check: log => {
      for (let i=0; i<log.length; i++) {
        if (log[i].type==="wake") {
          const within = log.filter(e=>e.type==="sleep" && Math.abs(e.ts-log[i].ts)<3600000);
          if (within.length>0) return true;
        }
      }
      return false;
    }},
  { id:"camel",     icon:"🐪", label:"沙漠骆驼",    desc:"当天有吃饭记录但喝水0次",
    check: log => {
      const t = new Date().toDateString();
      const today = log.filter(e=>new Date(e.ts).toDateString()===t);
      return today.some(e=>e.type==="meal") && !today.some(e=>e.type==="water");
    }},
  { id:"chicken",   icon:"🐔", label:"先有鸡",      desc:"吃饭出现在当天第一次起床之前",
    check: log => {
      const t = new Date().toDateString();
      const today = [...log.filter(e=>new Date(e.ts).toDateString()===t)].reverse();
      const firstWake = today.find(e=>e.type==="wake");
      const firstMeal = today.find(e=>e.type==="meal");
      if (!firstWake || !firstMeal) return false;
      return firstMeal.ts < firstWake.ts;
    }},
  { id:"sgrade",    icon:"💨", label:"管道效率S级", desc:"单日上厕所次数超过吃饭次数",
    check: log => {
      const t = new Date().toDateString();
      const today = log.filter(e=>new Date(e.ts).toDateString()===t);
      const toilets = today.filter(e=>e.type==="toilet").length;
      const meals = today.filter(e=>e.type==="meal").length;
      return meals>0 && toilets>meals;
    }},
  { id:"hydro",     icon:"🌊", label:"水文观测站",  desc:"单日喝水5次以上",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>e.type==="water"&&new Date(e.ts).toDateString()===t).length>=5; }},
  { id:"fullday",   icon:"✅", label:"全勤实体",    desc:"单日完成五个基础操作",
    check: log => {
      const t = new Date().toDateString();
      const today = log.filter(e=>new Date(e.ts).toDateString()===t);
      return ["wake","water","meal","sleep","toilet"].every(type=>today.some(e=>e.type===type));
    }},
  { id:"thermody",  icon:"🌡️", label:"违反热力学",  desc:"烧水后超过2小时没有喝水",
    check: log => {
      for (let i=0; i<log.length; i++) {
        if (log[i].type==="boil") {
          const after = log.filter(e=>e.type==="water" && e.ts>log[i].ts && e.ts-log[i].ts<7200000);
          if (after.length===0) {
            // check if 2 hours have passed
            if (Date.now()-log[i].ts>7200000) return true;
          }
        }
      }
      return false;
    }},
  { id:"schrodinger",icon:"📦", label:"薛定谔的一餐", desc:"同一分钟内记录了两次吃饭",
    check: log => {
      const meals = log.filter(e=>e.type==="meal");
      for (let i=0; i<meals.length; i++)
        for (let j=i+1; j<meals.length; j++)
          if (Math.abs(meals[i].ts-meals[j].ts)<60000) return true;
      return false;
    }},

  // 彩蛋成就（解锁改名）
  { id:"streak7",   icon:"🔑", label:"协议覆写",    desc:"连续7天都有起床和睡觉记录",
    check: log => {
      const days = new Set(log.map(e=>new Date(e.ts).toDateString()));
      let streak = 0;
      for (let i=0; i<7; i++) {
        const d = new Date(); d.setDate(d.getDate()-i);
        const ds = d.toDateString();
        if (!days.has(ds)) return false;
        const dayLog = log.filter(e=>new Date(e.ts).toDateString()===ds);
        if (!dayLog.some(e=>e.type==="wake") || !dayLog.some(e=>e.type==="sleep")) return false;
        streak++;
      }
      return streak>=7;
    }},
];

// ── 状态 ──────────────────────────────────────────────────────────────────────

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }

let state = {
  log:          load("hs_log", []),
  points:       load("hs_pts", 0),
  achUnlocked:  load("hs_ach", []),
  shopRedeemed: load("hs_shop", {}),
  entityName:   load("hs_name", "实体"),
  screen: "main",
  dialog: null,
  renaming: false,
  renameInput: "",
};

function save() {
  localStorage.setItem("hs_log",  JSON.stringify(state.log));
  localStorage.setItem("hs_pts",  JSON.stringify(state.points));
  localStorage.setItem("hs_ach",  JSON.stringify(state.achUnlocked));
  localStorage.setItem("hs_shop", JSON.stringify(state.shopRedeemed));
  localStorage.setItem("hs_name", JSON.stringify(state.entityName));
}

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function todaySeed() { return Math.floor(Date.now()/86400000); }

function dailyShop() {
  const seed = todaySeed();
  const rng = n => { let x=Math.sin(seed+n)*10000; return x-Math.floor(x); };
  return [...SHOP_POOL].sort((a,b)=>rng(a.id.charCodeAt(0))-rng(b.id.charCodeAt(0))).slice(0,4);
}

function fmt(ts, mode) {
  const d = new Date(ts);
  if (mode==="time") return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── 操作 ──────────────────────────────────────────────────────────────────────

function doAction(action) {
  const entry = { type:action.type, label:action.label, ts:Date.now() };
  state.log = [entry, ...state.log];
  state.points += action.pts;

  let achFound = null;
  for (const ach of ACHIEVEMENTS) {
    if (!state.achUnlocked.includes(ach.id) && ach.check(state.log)) {
      state.achUnlocked = [...state.achUnlocked, ach.id];
      achFound = ach;
      break;
    }
  }

  // 替换语料中的"实体"为当前称呼
  let text = rand(WITNESS[action.type] || ["【系统记录】已存档。"]);
  text = text.replace(/实体/g, state.entityName);

  state.dialog = { type:"witness", text, pts:action.pts, ach:achFound };
  save(); render();
}

function doRedeem(item) {
  if (state.points < item.cost) return;
  const key = `${todaySeed()}_${item.id}`;
  if (state.shopRedeemed[key]) return;
  state.points -= item.cost;
  state.shopRedeemed = { ...state.shopRedeemed, [key]: true };
  const pool = SHOP_WITNESS[item.id];
  let text = pool ? rand(pool) : `【系统授权】${item.name}已激活。\n\n${item.desc}\n\n本系统备案在册，有效期今日。`;
  text = text.replace(/实体/g, state.entityName);
  state.dialog = { type:"shop", text, pts:0 };
  save(); render();
}

function closeDialog() {
  // 彩蛋触发后打开改名
  if (state.dialog && state.dialog.rename) {
    state.dialog = { ...state.dialog, rename: false, showRename: true };
    render(); return;
  }
  state.dialog = null;
  state.renaming = false;
  render();
}

function confirmRename() {
  const name = state.renameInput.trim();
  if (name.length > 0 && name.length <= 8) {
    state.entityName = name;
    save();
  }
  state.dialog = null;
  state.renaming = false;
  state.renameInput = "";
  render();
}

function setScreen(s) { state.screen = s; render(); }

// ── 渲染 ──────────────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById("app");
  const proUnlocked = state.points >= PRO_THRESHOLD || state.log.length >= 20;
  const shop = dailyShop();

  app.innerHTML = `
    ${renderHeader(proUnlocked)}
    ${renderNav()}
    <div class="content">
      ${state.screen==="main" ? renderMain(proUnlocked) : ""}
      ${state.screen==="shop" ? renderShop(shop) : ""}
      ${state.screen==="log"  ? renderLog() : ""}
    </div>
    ${state.dialog ? renderDialog() : ""}
  `;

  // 绑定事件
  document.querySelectorAll(".action-btn").forEach(btn => {
    const type = btn.dataset.type;
    const action = [...BASIC_ACTIONS,...PRO_ACTIONS].find(a=>a.type===type);
    if (action) btn.addEventListener("click", ()=>doAction(action));
  });
  document.querySelectorAll(".nav-btn").forEach(btn =>
    btn.addEventListener("click", ()=>setScreen(btn.dataset.screen)));
  document.querySelectorAll(".redeem-btn").forEach(btn => {
    const item = SHOP_POOL.find(i=>i.id===btn.dataset.id);
    if (item) btn.addEventListener("click", ()=>doRedeem(item));
  });
  const dialogBtn = document.querySelector(".dialog-btn");
  if (dialogBtn) dialogBtn.addEventListener("click", closeDialog);
  const overlay = document.querySelector(".overlay");
  if (overlay) overlay.addEventListener("click", e=>{ if(e.target===overlay) closeDialog(); });
  const renameInput = document.querySelector(".rename-input");
  if (renameInput) {
    renameInput.value = state.renameInput;
    renameInput.addEventListener("input", e=>{ state.renameInput=e.target.value; });
  }
  const renameBtn = document.querySelector(".rename-confirm");
  if (renameBtn) renameBtn.addEventListener("click", confirmRename);
}

function renderHeader(proUnlocked) {
  return `
    <div class="header">
      <div>
        <div class="header-title">HUMAN SIMULATOR</div>
        <div class="header-sub">${proUnlocked ? `▸ 高级版运行中 · ${state.entityName}` : `▸ 基础版 · ${state.entityName} · ${PRO_THRESHOLD}积分解锁高级版`}</div>
      </div>
      <div>
        <div class="header-pts">${state.points}</div>
        <div class="header-pts-label">积分</div>
      </div>
    </div>`;
}

function renderNav() {
  return `<div class="nav">${[["main","主界面"],["shop","积分商店"],["log","记录档案"]].map(([s,l])=>`
    <button class="nav-btn ${state.screen===s?"active":""}" data-screen="${s}">${l}</button>
  `).join("")}</div>`;
}

function renderMain(proUnlocked) {
  const pct = Math.min(100, state.points/PRO_THRESHOLD*100);
  const achs = ACHIEVEMENTS.filter(a=>state.achUnlocked.includes(a.id));
  const hasRename = state.achUnlocked.includes("streak7");
  return `
    <div class="section-label">▸ 基础操作</div>
    <div class="action-grid">
      ${BASIC_ACTIONS.map(a=>`
        <button class="action-btn" data-type="${a.type}">
          <div class="icon">${a.icon}</div>
          <div class="label">${a.label}</div>
          <div class="pts">+${a.pts}pt</div>
        </button>`).join("")}
    </div>
    ${proUnlocked ? `
      <div class="section-label">▸ 高级操作 <span style="color:#2a5a7a;font-size:9px;margin-left:8px;">已解锁</span></div>
      <div class="action-grid-3">
        ${PRO_ACTIONS.map(a=>`
          <button class="action-btn" data-type="${a.type}">
            <div class="icon">${a.icon}</div>
            <div class="label">${a.label}</div>
            <div class="pts">+${a.pts}pt</div>
          </button>`).join("")}
      </div>` : `
      <div class="lock-box">
        <div class="lock-title">▸ 高级操作 · 锁定</div>
        <div class="lock-sub">累计达到 ${PRO_THRESHOLD} 积分后永久解锁。</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`}
    ${hasRename ? `
      <div style="margin-top:20px;padding:12px 16px;border:1px solid rgba(80,180,120,0.2);border-radius:8px;background:rgba(20,60,40,0.2);">
        <div style="font-size:10px;color:#4ab870;letter-spacing:0.1em;margin-bottom:8px;">▸ 协议覆写 · 已解锁</div>
        <div style="font-size:11px;color:#5a8a60;margin-bottom:10px;">实体可修改系统对其的识别标签。当前：${state.entityName}</div>
        <button onclick="(function(){state.renaming=true;render();})()" style="padding:6px 14px;background:rgba(80,180,120,0.1);border:1px solid rgba(80,180,120,0.25);border-radius:6px;color:#6ab888;font-size:10px;cursor:pointer;font-family:inherit;">修改称呼</button>
      </div>` : ""}
    ${achs.length>0 ? `
      <div style="margin-top:24px;">
        <div class="section-label">▸ 已解锁成就</div>
        <div class="ach-list">
          ${achs.map(a=>`<div class="ach-tag"><span>${a.icon}</span><span>${a.label}</span></div>`).join("")}
        </div>
      </div>` : ""}
    ${state.renaming ? renderRenamePanel() : ""}
  `;
}

function renderRenamePanel() {
  return `
    <div style="position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;">
      <div class="dialog">
        <div class="dialog-type">▸ 协议覆写 · 识别标签修改</div>
        <div class="dialog-text">本系统允许实体自定义识别标签。\n请输入新的称呼（最多8个字符）：</div>
        <div class="rename-box">
          <input class="rename-input" type="text" maxlength="8" placeholder="输入新称呼..." />
          <button class="rename-confirm">确认覆写</button>
        </div>
        <button class="dialog-btn" style="margin-top:10px;">取消</button>
      </div>
    </div>
  `;
}

function renderShop(shop) {
  const seed = todaySeed();
  return `
    <div class="section-label">▸ 今日供应</div>
    <div style="font-size:11px;color:#2a4a6a;margin-bottom:16px;">每日刷新 · 当前积分 ${state.points}</div>
    ${shop.map(item=>{
      const key=`${seed}_${item.id}`;
      const redeemed=!!state.shopRedeemed[key];
      const canAfford=state.points>=item.cost;
      return `
        <div class="shop-item ${redeemed?"redeemed":""}">
          <div class="shop-item-top">
            <div class="shop-item-info">
              <span class="shop-icon">${item.icon}</span>
              <div>
                <div class="shop-name">${item.name}</div>
                <div class="shop-cost">${item.cost} 积分</div>
              </div>
            </div>
            <button class="redeem-btn" data-id="${item.id}" ${redeemed||!canAfford?"disabled":""}>
              ${redeemed?"已兑换":"兑换"}
            </button>
          </div>
          <div class="shop-desc">${item.desc}</div>
        </div>`;
    }).join("")}`;
}

function renderLog() {
  return `
    <div class="section-label">▸ 存档记录 · 共 ${state.log.length} 条</div>
    ${state.log.length===0
      ? `<div style="font-size:12px;color:#2a4a6a;padding:20px 0;">暂无记录。回到主界面开始。</div>`
      : state.log.map(e=>`
          <div class="log-item">
            <span class="log-date">${fmt(e.ts,"date")}</span>
            <span class="log-time">${fmt(e.ts,"time")}</span>
            <span class="log-label">${e.label}</span>
            <span class="log-pts">+${PTS[e.type]||5}</span>
          </div>`).join("")}`;
}

function renderDialog() {
  const d = state.dialog;
  return `
    <div class="overlay">
      <div class="dialog">
        ${d.ach ? `
          <div class="dialog-ach">
            <div class="dialog-ach-label">▸ 隐藏成就解锁</div>
            <div class="dialog-ach-row">
              <span class="dialog-ach-icon">${d.ach.icon}</span>
              <div>
                <div class="dialog-ach-name">${d.ach.label}</div>
                <div class="dialog-ach-desc">${d.ach.desc}</div>
              </div>
            </div>
          </div>` : ""}
        <div class="dialog-type">${d.type==="shop"?"▸ 系统授权":"▸ 系统见证"}</div>
        <div class="dialog-text">${d.text}</div>
        ${d.pts>0 ? `<div class="dialog-pts">+${d.pts} 积分已记入</div>` : ""}
        ${d.showRename ? `
          <div class="rename-box">
            <div style="font-size:11px;color:#4ab870;margin-bottom:10px;">▸ 识别标签修改权限已激活</div>
            <input class="rename-input" type="text" maxlength="8" placeholder="输入新称呼..." />
            <button class="rename-confirm">确认覆写</button>
          </div>` : ""}
        <button class="dialog-btn">收到，继续</button>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
