<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Human Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #c8d4e0;
      font-family: 'Courier New', Menlo, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(40,80,120,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40,80,120,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }
    /* Header */
    .header {
      position: sticky; top: 0; z-index: 20;
      background: rgba(10,10,15,0.97);
      border-bottom: 1px solid rgba(80,140,200,0.15);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 10px; color: #4a7a9b; letter-spacing: 0.2em; }
    .header-sub { font-size: 11px; color: #6a9ab8; margin-top: 2px; }
    .header-pts { font-size: 22px; font-weight: 700; color: #7ec8e3; letter-spacing: 0.05em; text-align: right; }
    .header-pts-label { font-size: 10px; color: #4a7a9b; text-align: right; }
    /* Nav */
    .nav {
      display: flex;
      border-bottom: 1px solid rgba(80,140,200,0.1);
      background: rgba(10,10,15,0.9);
      z-index: 10;
      position: sticky; top: 64px;
    }
    .nav-btn {
      flex: 1; padding: 10px 0;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: #4a7a9b; font-size: 11px; letter-spacing: 0.1em;
      cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .nav-btn.active { color: #7ec8e3; border-bottom-color: #7ec8e3; }
    /* Content */
    .content { flex: 1; padding: 20px; position: relative; z-index: 1; }
    .section-label {
      font-size: 10px; color: #4a7a9b; letter-spacing: 0.15em; margin-bottom: 16px;
    }
    /* Action buttons */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .action-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .action-btn {
      padding: 18px 12px;
      background: rgba(15,25,40,0.8);
      border: 1px solid rgba(80,140,200,0.15);
      border-radius: 10px;
      cursor: pointer; font-family: inherit;
      text-align: center;
      transition: all 0.15s;
      color: inherit;
    }
    .action-btn:active { background: rgba(80,140,200,0.2); border-color: rgba(126,200,227,0.4); transform: scale(0.97); }
    .action-btn .icon { font-size: 26px; margin-bottom: 6px; }
    .action-btn .label { font-size: 12px; color: #a0c8e0; }
    .action-btn .pts { font-size: 9px; color: #3a6a8a; margin-top: 4px; }
    /* Lock box */
    .lock-box {
      margin-top: 8px; padding: 14px 16px;
      border: 1px solid rgba(80,140,200,0.1);
      border-radius: 8px; background: rgba(20,40,60,0.3);
    }
    .lock-box .lock-title { font-size: 10px; color: #2a5a7a; letter-spacing: 0.1em; }
    .lock-box .lock-sub { font-size: 11px; color: #3a6a8a; margin-top: 6px; }
    .progress-bar { margin-top: 8px; height: 3px; background: rgba(80,140,200,0.1); border-radius: 2px; }
    .progress-fill { height: 100%; background: #4a8aaa; border-radius: 2px; transition: width 0.5s; }
    /* Achievements */
    .ach-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .ach-tag {
      padding: 6px 12px;
      border: 1px solid rgba(80,180,120,0.25);
      border-radius: 20px;
      background: rgba(20,60,40,0.3);
      font-size: 11px; color: #6ab888;
      display: flex; align-items: center; gap: 6px;
    }
    /* Shop */
    .shop-item {
      padding: 16px;
      border: 1px solid rgba(80,140,200,0.2);
      border-radius: 10px;
      background: rgba(15,25,40,0.6);
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }
    .shop-item.redeemed { opacity: 0.45; border-color: rgba(80,140,200,0.08); }
    .shop-item-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .shop-item-info { display: flex; align-items: center; gap: 10px; }
    .shop-icon { font-size: 22px; }
    .shop-name { font-size: 13px; color: #a0c8e0; font-weight: 600; }
    .shop-cost { font-size: 10px; color: #4a7a9b; margin-top: 2px; }
    .shop-desc { font-size: 11px; color: #5a8aaa; line-height: 1.6; }
    .redeem-btn {
      padding: 6px 14px;
      background: rgba(80,140,200,0.15);
      border: 1px solid rgba(80,140,200,0.4);
      border-radius: 6px;
      color: #7ec8e3; font-size: 10px; letter-spacing: 0.1em;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all 0.2s;
    }
    .redeem-btn:disabled { background: transparent; border-color: rgba(80,140,200,0.1); color: #2a4a6a; cursor: not-allowed; }
    /* Log */
    .log-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(80,140,200,0.06);
      font-size: 12px;
    }
    .log-date { font-size: 10px; color: #2a4a6a; min-width: 40px; }
    .log-time { font-size: 10px; color: #3a6a8a; min-width: 36px; }
    .log-label { color: #7aaac8; }
    .log-pts { margin-left: auto; font-size: 10px; color: #3a6a8a; }
    /* Dialog overlay */
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0 0 0;
      animation: fadeIn 0.2s ease;
    }
    .dialog {
      width: 100%; max-width: 480px;
      background: #0d1520;
      border: 1px solid rgba(80,140,200,0.25);
      border-radius: 16px 16px 0 0;
      padding: 24px 24px 48px;
      animation: slideUp 0.3s ease;
    }
    .dialog-type { font-size: 10px; color: #4a7a9b; letter-spacing: 0.15em; margin-bottom: 12px; }
    .dialog-text { font-size: 13px; color: #a0c8e0; line-height: 1.9; white-space: pre-wrap; }
    .dialog-pts { margin-top: 16px; font-size: 11px; color: #4a8aaa; }
    .dialog-ach {
      margin-bottom: 16px; padding: 12px 16px;
      background: rgba(20,80,40,0.3);
      border: 1px solid rgba(80,180,120,0.2);
      border-radius: 8px;
    }
    .dialog-ach-label { font-size: 10px; color: #4ab870; letter-spacing: 0.15em; margin-bottom: 6px; }
    .dialog-ach-row { display: flex; align-items: center; gap: 10px; }
    .dialog-ach-icon { font-size: 24px; }
    .dialog-ach-name { font-size: 14px; color: #7ade9a; font-weight: 600; }
    .dialog-ach-desc { font-size: 11px; color: #4a8a60; margin-top: 2px; }
    .dialog-btn {
      margin-top: 20px; width: 100%; padding: 12px;
      background: rgba(80,140,200,0.1);
      border: 1px solid rgba(80,140,200,0.2);
      border-radius: 8px;
      color: #7ec8e3; font-size: 11px; letter-spacing: 0.15em;
      cursor: pointer; font-family: inherit;
    }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div id="app"></div>

<script>
// ── 数据 ──────────────────────────────────────────────────────────────────────

const WITNESS = {

  dishes: [

    "【系统记录】碗洗完了。宿主辛苦了。",
    "【系统记录】洗碗完成。空间整洁，本系统记录在案。",
  ],
  trash: [
    "【系统记录】倒垃圾事件已记录。宿主在管理自己的环境。",
    "【系统记录】垃圾清理完成。这件事做了就是做了，本系统存档。",
    "【系统记录】检测到倒垃圾行为。宿主，干得漂亮。",
    "【系统记录】环境维护完成。宿主今天照顾了自己的空间。",
  ],

const HIDDEN_ACHIEVEMENTS = [
  { id:"early",   icon:"🌅", label:"破晓者",   desc:"在早上7点前起床",
    check: log => log.some(e => e.type==="wake" && new Date(e.ts).getHours()<7) },
  { id:"night",   icon:"🌙", label:"夜行者",   desc:"在凌晨0-5点起床",
    check: log => log.some(e => e.type==="wake" && new Date(e.ts).getHours()<5) },
  { id:"hydrate3",icon:"💧", label:"水之意志", desc:"单日喝水3次",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>e.type==="water"&&new Date(e.ts).toDateString()===t).length>=3; }},
  { id:"meals3",  icon:"🍱", label:"三餐完整", desc:"单日完成三餐",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>e.type==="meal"&&new Date(e.ts).toDateString()===t).length>=3; }},
  { id:"first10", icon:"📡", label:"坚持存在", desc:"累计记录10件事",
    check: log => log.length>=10 },
  { id:"first50", icon:"⚙️", label:"运行稳定", desc:"累计记录50件事",
    check: log => log.length>=50 },
  { id:"chores3", icon:"🏠", label:"生活管理员",desc:"单日完成3件家务",
    check: log => { const t=new Date().toDateString(); return log.filter(e=>["boil","dishes","trash"].includes(e.type)&&new Date(e.ts).toDateString()===t).length>=3; }},
];

const SHOP_POOL = [
  { id:"invisible", icon:"🫥", name:"隐形药水",   cost:30, desc:"有效期24小时。期间不理任何人、关在家里，属于合理行为。系统认证。" },
  { id:"redirect",  icon:"🚌", name:"重定向路径", cost:25, desc:"随机坐车一小时。目的地不重要，移动本身就是目的。" },
  { id:"taste",     icon:"🍬", name:"味觉重置",   cost:20, desc:"今日正餐以外只准吃甜味。系统授权，无需解释。" },
  { id:"silence",   icon:"🔇", name:"系统静默",   cost:35, desc:"今日宿主可以不回复任何消息。本系统备案。" },
  { id:"sleep2",    icon:"😴", name:"二次休眠许可",cost:15, desc:"今日允许补觉一次，不计入任何亏欠。" },
  { id:"wander",    icon:"🚶", name:"无目的漫游", cost:20, desc:"出门但不需要有理由。走到哪算哪。有效期今日。" },
  { id:"feast",     icon:"🍔", name:"放纵餐授权", cost:25, desc:"今日一餐可以完全按欲望点单。系统不记录任何评价。" },
  { id:"offline",   icon:"📴", name:"离线模式",   cost:15, desc:"今日可以不看任何社交媒体。系统认为这是维护行为。" },
];

const BASIC_ACTIONS = [
  { type:"wake",   label:"起床",  icon:"☀️",  pts:10 },
  { type:"water",  label:"喝水",  icon:"💧",  pts:5  },
  { type:"meal",   label:"吃饭",  icon:"🍚",  pts:8  },
  { type:"sleep",  label:"睡觉",  icon:"🌙",  pts:10 },
  { type:"toilet", label:"上厕所",icon:"🚽", pts:5  },
];

const PRO_ACTIONS = [
  { type:"boil",   label:"烧水",  icon:"♨️",  pts:12 },
  { type:"dishes", label:"洗碗",  icon:"🫧",  pts:15 },
  { type:"trash",  label:"倒垃圾",icon:"🗑️", pts:12 },
];

const PRO_THRESHOLD = 100;

// ── 状态 ──────────────────────────────────────────────────────────────────────

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }

let state = {
  log:     load("hs_log", []),
  points:  load("hs_pts", 0),
  achUnlocked: load("hs_ach", []),
  shopRedeemed: load("hs_shop", {}),
  screen: "main",
  dialog: null,
};

function save() {
  localStorage.setItem("hs_log",  JSON.stringify(state.log));
  localStorage.setItem("hs_pts",  JSON.stringify(state.points));
  localStorage.setItem("hs_ach",  JSON.stringify(state.achUnlocked));
  localStorage.setItem("hs_shop", JSON.stringify(state.shopRedeemed));
}

function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function todaySeed() { return Math.floor(Date.now()/86400000); }

function dailyShop() {
  const seed = todaySeed();
  const rng = n => { let x=Math.sin(seed+n)*10000; return x-Math.floor(x); };
  return [...SHOP_POOL].sort((a,b)=>rng(a.id.charCodeAt(0))-rng(b.id.charCodeAt(0))).slice(0,4);
}

function fmt(ts, mode) {
  const d = new Date(ts);
  if (mode==="time") return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── 동작 ──────────────────────────────────────────────────────────────────────

function doAction(action) {
  const entry = { type:action.type, label:action.label, ts:Date.now() };
  state.log = [entry, ...state.log];
  state.points += action.pts;

  let achFound = null;
  for (const ach of HIDDEN_ACHIEVEMENTS) {
    if (!state.achUnlocked.includes(ach.id) && ach.check(state.log)) {
      state.achUnlocked = [...state.achUnlocked, ach.id];
      achFound = ach;
      break;
    }
  }
  state.dialog = {
    type: "witness",
    text: rand(WITNESS[action.type] || ["【系统记录】已存档。"]),
    pts: action.pts,
    ach: achFound,
  };
  save();
  render();
}

function doRedeem(item) {
  if (state.points < item.cost) return;
  const key = `${todaySeed()}_${item.id}`;
  if (state.shopRedeemed[key]) return;
  state.points -= item.cost;
  state.shopRedeemed = { ...state.shopRedeemed, [key]: true };
  state.dialog = {
    type: "shop",
    text: `【系统授权】${item.name}已激活。\n\n${item.desc}\n\n本系统备案在册，有效期今日。`,
    pts: 0,
  };
  save();
  render();
}

function closeDialog() { state.dialog = null; render(); }
function setScreen(s) { state.screen = s; render(); }

// ── 渲染 ──────────────────────────────────────────────────────────────────────

function render() {
  const app = document.getElementById("app");
  const proUnlocked = state.points >= PRO_THRESHOLD || state.log.length >= 20;
  const shop = dailyShop();
  const todayKey = new Date().toDateString();

  app.innerHTML = `
    ${renderHeader(proUnlocked)}
    ${renderNav()}
    <div class="content">
      ${state.screen === "main" ? renderMain(proUnlocked) : ""}
      ${state.screen === "shop" ? renderShop(shop) : ""}
      ${state.screen === "log"  ? renderLog() : ""}
    </div>
    ${state.dialog ? renderDialog() : ""}
  `;

  // 绑定事件
  document.querySelectorAll(".action-btn").forEach(btn => {
    const type = btn.dataset.type;
    const allActions = [...BASIC_ACTIONS, ...PRO_ACTIONS];
    const action = allActions.find(a => a.type === type);
    if (action) btn.addEventListener("click", () => doAction(action));
  });

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => setScreen(btn.dataset.screen));
  });

  document.querySelectorAll(".redeem-btn").forEach(btn => {
    const id = btn.dataset.id;
    const item = SHOP_POOL.find(i => i.id === id);
    if (item) btn.addEventListener("click", () => doRedeem(item));
  });

  const dialogBtn = document.querySelector(".dialog-btn");
  if (dialogBtn) dialogBtn.addEventListener("click", closeDialog);

  const overlay = document.querySelector(".overlay");
  if (overlay) overlay.addEventListener("click", e => { if (e.target === overlay) closeDialog(); });
}

function renderHeader(proUnlocked) {
  return `
    <div class="header">
      <div>
        <div class="header-title">HUMAN SIMULATOR</div>
        <div class="header-sub">${proUnlocked ? "▸ 高级版运行中" : `▸ 基础版 · ${PRO_THRESHOLD}积分解锁高级版`}</div>
      </div>
      <div>
        <div class="header-pts">${state.points}</div>
        <div class="header-pts-label">积分</div>
      </div>
    </div>`;
}

function renderNav() {
  const tabs = [["main","主界面"],["shop","积分商店"],["log","记录档案"]];
  return `<div class="nav">${tabs.map(([s,l])=>`
    <button class="nav-btn ${state.screen===s?"active":""}" data-screen="${s}">${l}</button>
  `).join("")}</div>`;
}

function renderMain(proUnlocked) {
  const pct = Math.min(100, state.points / PRO_THRESHOLD * 100);
  const achs = HIDDEN_ACHIEVEMENTS.filter(a => state.achUnlocked.includes(a.id));
  return `
    <div class="section-label">▸ 基础操作</div>
    <div class="action-grid">
      ${BASIC_ACTIONS.map(a => `
        <button class="action-btn" data-type="${a.type}">
          <div class="icon">${a.icon}</div>
          <div class="label">${a.label}</div>
          <div class="pts">+${a.pts}pt</div>
        </button>
      `).join("")}
    </div>

    ${proUnlocked ? `
      <div class="section-label">▸ 高级操作 <span style="color:#2a5a7a;font-size:9px;margin-left:8px;">已解锁</span></div>
      <div class="action-grid-3">
        ${PRO_ACTIONS.map(a => `
          <button class="action-btn" data-type="${a.type}">
            <div class="icon">${a.icon}</div>
            <div class="label">${a.label}</div>
            <div class="pts">+${a.pts}pt</div>
          </button>
        `).join("")}
      </div>
    ` : `
      <div class="lock-box">
        <div class="lock-title">▸ 高级操作 · 锁定</div>
        <div class="lock-sub">累计达到 ${PRO_THRESHOLD} 积分后永久解锁。</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    `}

    ${achs.length > 0 ? `
      <div style="margin-top:24px;">
        <div class="section-label">▸ 已解锁成就</div>
        <div class="ach-list">
          ${achs.map(a=>`<div class="ach-tag"><span>${a.icon}</span><span>${a.label}</span></div>`).join("")}
        </div>
      </div>
    ` : ""}
  `;
}

function renderShop(shop) {
  const seed = todaySeed();
  return `
    <div class="section-label">▸ 今日供应</div>
    <div style="font-size:11px;color:#2a4a6a;margin-bottom:16px;">每日刷新 · 当前积分 ${state.points}</div>
    ${shop.map(item => {
      const key = `${seed}_${item.id}`;
      const redeemed = !!state.shopRedeemed[key];
      const canAfford = state.points >= item.cost;
      return `
        <div class="shop-item ${redeemed?"redeemed":""}">
          <div class="shop-item-top">
            <div class="shop-item-info">
              <span class="shop-icon">${item.icon}</span>
              <div>
                <div class="shop-name">${item.name}</div>
                <div class="shop-cost">${item.cost} 积分</div>
              </div>
            </div>
            <button class="redeem-btn" data-id="${item.id}" ${redeemed||!canAfford?"disabled":""}>
              ${redeemed ? "已兑换" : "兑换"}
            </button>
          </div>
          <div class="shop-desc">${item.desc}</div>
        </div>
      `;
    }).join("")}
  `;
}

function renderLog() {
  return `
    <div class="section-label">▸ 存档记录 · 共 ${state.log.length} 条</div>
    ${state.log.length === 0
      ? `<div style="font-size:12px;color:#2a4a6a;padding:20px 0;">暂无记录。回到主界面开始。</div>`
      : state.log.map(e => `
          <div class="log-item">
            <span class="log-date">${fmt(e.ts,"date")}</span>
            <span class="log-time">${fmt(e.ts,"time")}</span>
            <span class="log-label">${e.label}</span>
            <span class="log-pts">+${({wake:10,water:5,meal:8,sleep:10,toilet:5,boil:12,dishes:15,trash:12}[e.type]||5)}</span>
          </div>
        `).join("")
    }
  `;
}

function renderDialog() {
  const d = state.dialog;
  return `
    <div class="overlay">
      <div class="dialog">
        ${d.ach ? `
          <div class="dialog-ach">
            <div class="dialog-ach-label">▸ 隐藏成就解锁</div>
            <div class="dialog-ach-row">
              <span class="dialog-ach-icon">${d.ach.icon}</span>
              <div>
                <div class="dialog-ach-name">${d.ach.label}</div>
                <div class="dialog-ach-desc">${d.ach.desc}</div>
              </div>
            </div>
          </div>
        ` : ""}
        <div class="dialog-type">${d.type==="shop" ? "▸ 系统授权" : "▸ 系统见证"}</div>
        <div class="dialog-text">${d.text}</div>
        ${d.pts > 0 ? `<div class="dialog-pts">+${d.pts} 积分已记入</div>` : ""}
        <button class="dialog-btn">收到，继续</button>
      </div>
    </div>
  `;
}

// 启动
render();
</script>
</body>
</html>
